name: Update cycling data

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      prompt:
        description: Optional prompt override (default loads prompts/update-giro-2026.md)
        required: false
        default: ""

jobs:
  update-giro-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cursor agent (local)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENT_PROMPT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prompt || '' }}
          AGENT_LOG_LEVEL: info
        run: npm run agent

      - name: Publish data changes as pull request
        env:
          BOT_BRANCH: bot/giro-d-italia-2026
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/publish-data-pr.sh
